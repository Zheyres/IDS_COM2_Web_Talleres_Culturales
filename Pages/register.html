<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Taller</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>

<h1>Registrar Taller Cultural</h1>

<form id="formTaller">
  <input type="text" placeholder="Nombre del Taller" required>
  <input type="text" placeholder="Descripción" required>
  <input type="text" placeholder="Direccion" required>
  <input type="email" placeholder="E-mail" required>
  <input type="text" placeholder="Horarios" required>
  <input type="text" placeholder="Nombre Titular" required>
  <select>
    <option value="musica">Música</option>
    <option value="pintura">Pintura</option>
    <option value="manualidades">Manualidades</option>
  </select>

  <button type="submit">Submit</button>
  <button onclick="window.location.href='Basepage.html'">
  ← Volver
</button>
</form>

</body>
</html>
